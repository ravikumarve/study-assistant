<!DOCTYPE html>
<html>
<head>
    <title>UI Test</title>
    <style>
        .test-box {
            background: rgba(26, 29, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h2>Glassmorphism Test</h2>
        <p>If you see a blurred glass effect, backdrop-filter is working.</p>
        <p>If this looks like a plain box, your browser may not support backdrop-filter.</p>
    </div>
</body>
</html>
