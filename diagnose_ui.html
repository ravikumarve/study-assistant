<!DOCTYPE html>
<html>
<head>
    <title>UI Diagnosis</title>
    <style>
        body { 
            font-family: system-ui; 
            padding: 20px; 
            background: #0f1117;
            color: white;
        }
        .test-case { 
            margin: 20px 0; 
            padding: 20px; 
            border: 1px solid #333; 
            border-radius: 8px; 
        }
        .success { color: #4CAF50; }
        .warning { color: #FF9800; }
        .error { color: #F44336; }
        .glass-test {
            background: rgba(26, 29, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin: 10px 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <h1>UI Rendering Diagnosis</h1>
    
    <div class="test-case">
        <h2>1. Basic CSS Test</h2>
        <div style="background: #1a1d27; color: #e8eaf0; padding: 15px; border-radius: 8px;">
            This should have a dark background with light text.
        </div>
    </div>

    <div class="test-case">
        <h2>2. Glassmorphism Test (Hardcoded)</h2>
        <div class="glass-test">
            This should have a glass effect with blur and transparency.
        </div>
    </div>

    <div class="test-case">
        <h2>3. Application CSS Test</h2>
        <div id="app-css-test" style="padding: 15px;">Loading application CSS...</div>
    </div>

    <div class="test-case">
        <h2>4. Browser Capabilities</h2>
        <div id="capabilities">Testing...</div>
    </div>

    <script>
        // Test browser capabilities
        const capabilities = {
            cssVariables: CSS.supports('color', 'var(--test)'),
            backdropFilter: CSS.supports('backdrop-filter', 'blur(10px)') || 
                          CSS.supports('-webkit-backdrop-filter', 'blur(10px)'),
            flexbox: CSS.supports('display', 'flex'),
            grid: CSS.supports('display', 'grid')
        };

        let capabilitiesHtml = '<ul>';
        for (const [cap, supported] of Object.entries(capabilities)) {
            capabilitiesHtml += `<li>${cap}: ${supported ? '✅' : '❌'}</li>`;
        }
        capabilitiesHtml += '</ul>';
        
        document.getElementById('capabilities').innerHTML = capabilitiesHtml;

        // Test application CSS
        fetch('/static/style.css')
            .then(response => response.text())
            .then(css => {
                const testDiv = document.getElementById('app-css-test');
                if (css.includes('--glass-bg') && css.includes('backdrop-filter')) {
                    testDiv.innerHTML = '<span class="success">✅ Application CSS loaded and contains glassmorphism styles</span>';
                    
                    // Create a test element with app styles
                    const appStyleTest = document.createElement('div');
                    appStyleTest.className = 'result-container';
                    appStyleTest.innerHTML = 'This should mimic the app\'s result container style';
                    testDiv.appendChild(appStyleTest);
                    
                } else {
                    testDiv.innerHTML = '<span class="error">❌ Application CSS missing glassmorphism styles</span>';
                }
            })
            .catch(error => {
                document.getElementById('app-css-test').innerHTML = 
                    `<span class="error">❌ Failed to load application CSS: ${error.message}</span>`;
            });
    </script>
</body>
</html>
