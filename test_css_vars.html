<!DOCTYPE html>
<html>
<head>
    <title>CSS Variables Test</title>
    <style>
        :root {
            --c-bg: #0f1117;
            --c-surface: #1a1d27;
            --c-text: #e8eaf0;
        }
        
        .test-box {
            background: var(--c-surface);
            color: var(--c-text);
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
        }
    </style>
</head>
<body style="background: var(--c-bg);">
    <div class="test-box">
        <h2>CSS Variables Test</h2>
        <p>If you see dark colors, CSS variables are working.</p>
        <p>If this looks like default styles, CSS variables may not be supported.</p>
    </div>
</body>
</html>
